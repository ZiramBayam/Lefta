name: Build, Release, and Verify
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        contract:
          - name: template-registry
            wasm: template_registry
          - name: split-router
            wasm: split_router
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91.0
        run: |
          rustup set profile minimal
          rustup toolchain install 1.91.0 --target wasm32v1-none
          rustup default 1.91.0

      - name: Build WASM
        working-directory: contracts
        run: |
          cargo build --release -p ${{ matrix.contract.name }}

      - name: Inject SEP-58 metadata
        working-directory: contracts
        run: |
          python3 inject_sep58.py \
            "target/wasm32v1-none/release/${{ matrix.contract.wasm }}.wasm" \
            "${{ github.server_url }}/${{ github.repository }}" \
            "${{ github.sha }}"

      - name: Compute WASM hash
        id: hash
        working-directory: contracts
        run: |
          echo "hash=$(sha256sum target/wasm32v1-none/release/${{ matrix.contract.wasm }}.wasm | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: contracts
        run: |
          gh release create "${{ matrix.contract.name }}-${{ github.ref_name }}" \
            "target/wasm32v1-none/release/${{ matrix.contract.wasm }}.wasm" \
            --title "${{ matrix.contract.name }} ${{ github.ref_name }}" \
            --notes "Build from commit ${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'contracts/target/wasm32v1-none/release/${{ matrix.contract.wasm }}.wasm'
          subject-name: '${{ matrix.contract.wasm }}.wasm'

      - name: Notify Stellar Expert
        run: |
          curl -s -X POST "https://api.stellar.expert/explorer/public/contract-validation/match" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.server_url }}/${{ github.repository }}",
              "commitHash": "${{ github.sha }}",
              "jobId": "${{ github.job }}",
              "runId": "${{ github.run_id }}",
              "contractHash": "${{ steps.hash.outputs.hash }}",
              "relativePath": "contracts/${{ matrix.contract.name }}",
              "packageName": "${{ matrix.contract.name }}"
            }' \
            --max-time 15 || echo "Stellar Expert notification sent (or failed silently)"
